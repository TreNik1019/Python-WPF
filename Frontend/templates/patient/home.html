{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center h-[calc(100vh-64px)] bg-[#0d1117] text-center px-4">
    <div class="p-6 bg-[#161b22] border border-[#30363d] rounded-xl max-w-md shadow-2xl">
        <i data-lucide="info" class="w-12 h-12 text-[#388bfd] mx-auto mb-4"></i>
        <h2 class="text-[#e6edf3] text-2xl font-semibold mb-2">Willkommen zurück</h2>
        <p class="text-[#8b949e] text-sm mb-6">
            Nutzen Sie das Menü <strong class="text-[#e6edf3]">Aktionen</strong> oben rechts, um die Patientensuche zu starten oder neue Datensätze zu erfassen.
        </p>
    </div>
</div>
{% endblock %}
