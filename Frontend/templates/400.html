{% extends 'base.html' %}

{% block title %}Ungültige Anfrage{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center h-[calc(100vh-64px)] bg-[#0d1117] text-center px-4">
    <div class="p-6 bg-[#161b22] border border-[#30363d] rounded-xl max-w-md shadow-2xl">
        <i data-lucide="alert-circle" class="w-12 h-12 text-[#f85149] mx-auto mb-4"></i>
        <h2 class="text-[#e6edf3] text-2xl font-semibold mb-2">400 – Ungültige Anfrage</h2>
        <p class="text-[#8b949e] text-sm mb-6">
            Die Anfrage konnte aufgrund einer fehlerhaften Syntax nicht verarbeitet werden.
        </p>
        <a href="{% url 'home' %}"
            class="inline-flex items-center gap-2 rounded bg-[#388bfd] text-white font-medium h-9 px-4 hover:opacity-85 transition-opacity text-sm no-underline">
            Zur Startseite
        </a>
    </div>
</div>
{% endblock %}
