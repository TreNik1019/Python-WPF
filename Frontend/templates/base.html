{% load static %}
<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Patientenverwaltung{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="min-h-screen w-full flex flex-col bg-[#0d1117] text-[#c9d1d9] font-sans antialiased">
    <header class="flex items-center justify-between px-6 flex-shrink-0 bg-[#161b22] border-b border-[#30363d]" style="height: 64px;">
        
        <a href="{% url 'home' %}" 
            class="flex items-center gap-3 cursor-pointer group" 
            title="Zur Startseite">
        
            <div class="flex items-center justify-center rounded-xl bg-[#21262d] border border-[#30363d] transition-all group-hover:opacity-80 group-active:scale-95" 
                style="width: 56px; height: 56px;">
                <img src="{% static 'images.png' %}" 
                    alt="Logo" 
                    class="w-full h-full object-cover rounded-xl">
            </div>

            <div class="flex items-center h-[56px]">
                <h1 class="text-[#e6edf3] font-bold text-[24px] leading-[56px] tracking-tight m-0 p-0 transition-colors group-hover:text-[#388bfd]">
                    Patientenverwaltung
                </h1>
            </div>

        </a>

        <details class="relative group">
            <summary class="flex items-center gap-2 px-4 py-2 bg-[#21262d] border border-[#30363d] text-[#e6edf3] rounded-lg text-sm font-medium hover:bg-[#30363d] hover:border-[#8b949e] transition-all cursor-pointer list-none select-none [&::-webkit-details-marker]:hidden">
                <span>Aktionen</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-[#8b949e] group-open:rotate-180 transition-transform"></i>
            </summary>

            <div class="absolute right-0 mt-1 w-56 bg-[#161b22] border border-[#30363d] rounded-lg shadow-xl z-50">
                <div class="py-1 p-1 flex flex-col gap-0.5">
                
                    <a href="{% url 'patienten_suche' %}" class="flex items-center gap-2 px-3 py-2 text-sm text-[#c9d1d9] rounded-md hover:bg-[#21262d] hover:text-[#388bfd] transition-colors">
                        <i data-lucide="search" class="w-4 h-4"></i>
                        <span>Patienten suchen</span>
                    </a>

                    <hr class="border-[#30363d] my-1">

                    <div class="flex items-center justify-between px-3 py-2 text-sm text-[#c9d1d9] opacity-40 cursor-not-allowed select-none">
                        <span class="flex items-center gap-2">
                            <i data-lucide="user-plus" class="w-4 h-4"></i>
                            Patient anlegen
                        </span>
                        <span class="text-[10px] bg-[#21262d] text-[#8b949e] px-1.5 py-0.5 rounded font-mono">Soon</span>
                    </div>

                    <div class="flex items-center justify-between px-3 py-2 text-sm text-[#c9d1d9] opacity-40 cursor-not-allowed select-none">
                        <span class="flex items-center gap-2">
                            <i data-lucide="user-cog" class="w-4 h-4"></i>
                            Patient ändern
                        </span>
                        <span class="text-[10px] bg-[#21262d] text-[#8b949e] px-1.5 py-0.5 rounded font-mono">Soon</span>
                    </div>

                    <div class="flex items-center justify-between px-3 py-2 text-sm text-[#f85149] opacity-40 cursor-not-allowed select-none">
                        <span class="flex items-center gap-2">
                            <i data-lucide="user-x" class="w-4 h-4"></i>
                            Patient löschen
                        </span>
                        <span class="text-[10px] bg-[#21262d] text-[#8b949e] px-1.5 py-0.5 rounded font-mono">Soon</span>
                    </div>
                
                </div>
            </div>
        </details>
    </header>

    {% block content %}{% endblock %}

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
